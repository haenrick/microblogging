services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: microblog
    volumes:
      - ./pb_data:/pb_data
      - ./pb_public:/pb_public
    ports:
      - "8097:8090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
