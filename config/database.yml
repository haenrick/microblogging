default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  username: <%= ENV.fetch("DB_USER") { "fl4re" } %>
  password: <%= ENV["DB_PASSWORD"] %>

development:
  <<: *default
  database: fl4re_development

test:
  <<: *default
  database: fl4re_test

production:
  <<: *default
  database: fl4re_production
